{% extends 'app_movimientos/base.html' %}

{% block page_title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-6">
        <div class="logico-card">
            <div class="card-body p-5 text-center">
                <div class="mb-4 text-danger">
                    <i class="fa-solid fa-triangle-exclamation fa-4x"></i>
                </div>
                
                <h4 class="fw-bold mb-3">¿Estás seguro de que deseas eliminar este registro?</h4>
                <p class="text-muted mb-4">Esta acción no se puede deshacer y borrará permanentemente: <br> <strong>"{{ object }}"</strong></p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3 mt-4">
                        <a href="{% url url_cancelar %}" class="btn btn-light border px-4">Cancelar</a>
                        <button type="submit" class="btn btn-danger px-4">Sí, eliminar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
